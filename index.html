<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gavilanbe // ARCADE — la colección de juegos</title>
<meta name="description" content="Una colección hecha a mano de juegos web, de terminal y homebrew. Jugables directamente en el navegador.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕹️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080810; --panel:#13131f; --panel2:#1b1b2c; --line:#2a2a40;
    --ink:#e8e8f4; --dim:#9a9ab8;
    --green:#5ee07a; --magenta:#ff5dbb; --cyan:#4ad7ff; --gold:#ffce4a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'VT323',monospace; font-size:21px; line-height:1.35;
    background-image:
      radial-gradient(circle at 20% -10%, rgba(94,224,122,.10), transparent 45%),
      radial-gradient(circle at 90% 0%, rgba(255,93,187,.10), transparent 40%),
      linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
    background-size:auto,auto,100% 3px,3px 100%;
    min-height:100vh;
  }
  /* CRT scanlines */
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.10) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1240px; margin:0 auto; padding:0 20px}

  header{padding:64px 20px 30px; text-align:center; position:relative}
  .logo{
    font-family:'Press Start 2P',monospace; font-size:clamp(22px,5vw,46px);
    letter-spacing:1px; line-height:1.25;
    color:#fff;
    text-shadow:0 0 8px var(--green), 4px 4px 0 var(--magenta);
  }
  .logo b{color:var(--green)}
  .blurb{margin-top:18px; color:var(--dim); font-size:23px}
  .blurb b{color:var(--gold)}
  .stats{margin-top:22px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
  .stat{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px 16px; font-size:20px; color:var(--dim);
  }
  .stat b{font-family:'Press Start 2P'; font-size:15px; color:var(--cyan); margin-right:6px}
  .gh{display:inline-block; margin-top:18px; color:var(--ink); border-bottom:1px dashed var(--dim)}
  .gh:hover{color:var(--green)}

  /* controls */
  .controls{
    position:sticky; top:0; z-index:30; background:rgba(8,8,16,.86);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:14px 0; margin-bottom:30px;
  }
  .controls .wrap{display:flex; gap:14px; align-items:center; flex-wrap:wrap; justify-content:center}
  .tabs{display:flex; gap:8px; flex-wrap:wrap}
  .tab{
    font-family:'VT323'; font-size:21px; cursor:pointer; user-select:none;
    background:var(--panel); border:1px solid var(--line); color:var(--dim);
    padding:7px 16px; border-radius:999px; transition:.15s;
  }
  .tab:hover{color:var(--ink); border-color:var(--dim)}
  .tab.on{background:var(--green); color:#06210f; border-color:var(--green); font-weight:bold; box-shadow:0 0 14px rgba(94,224,122,.5)}
  #search{
    flex:1; min-width:180px; max-width:340px;
    background:var(--panel); border:1px solid var(--line); color:var(--ink);
    font-family:'VT323'; font-size:21px; padding:8px 14px; border-radius:999px; outline:none;
  }
  #search:focus{border-color:var(--cyan); box-shadow:0 0 12px rgba(74,215,255,.35)}

  .sectiontitle{
    font-family:'Press Start 2P'; font-size:15px; color:var(--gold);
    margin:34px 0 16px; padding-left:4px; border-left:4px solid var(--gold);
    padding:6px 0 6px 12px;
  }
  .grid{
    display:grid; gap:18px;
    grid-template-columns:repeat(auto-fill, minmax(252px,1fr));
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; display:flex; flex-direction:column;
    transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover{transform:translateY(-5px); border-color:var(--green); box-shadow:0 10px 30px rgba(0,0,0,.5), 0 0 0 1px var(--green)}
  .shot{position:relative; aspect-ratio:16/10; background:#0c0c16; overflow:hidden}
  .shot img{width:100%; height:100%; object-fit:cover; image-rendering:auto; display:block}
  .shot.noimg{display:flex; align-items:center; justify-content:center; font-size:74px;
    background:radial-gradient(circle at 50% 40%, var(--panel2), #0c0c16)}
  .ribbon{
    position:absolute; top:10px; right:-34px; transform:rotate(40deg);
    background:var(--gold); color:#241a00; font-family:'Press Start 2P'; font-size:9px;
    padding:4px 38px; box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .chip{
    position:absolute; top:8px; left:8px; font-size:16px; padding:2px 9px; border-radius:999px;
    backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,.18);
  }
  .chip.web{background:rgba(74,215,255,.22); color:#bff0ff}
  .chip.terminal{background:rgba(255,93,187,.20); color:#ffcdee}
  .body{padding:13px 14px 14px; display:flex; flex-direction:column; gap:6px; flex:1}
  .title{font-size:25px; line-height:1.05; color:#fff}
  .tagline{color:var(--dim); font-size:19px; flex:1;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
  .actions{display:flex; gap:8px; margin-top:6px}
  .btn{
    font-family:'VT323'; font-size:19px; padding:6px 14px; border-radius:8px; cursor:pointer;
    border:1px solid var(--line); color:var(--ink); background:var(--panel2); transition:.15s; flex:0 0 auto;
  }
  .btn:hover{border-color:var(--dim)}
  .btn.play{background:var(--green); color:#06210f; border-color:var(--green); font-weight:bold; flex:1; text-align:center}
  .btn.play:hover{box-shadow:0 0 14px rgba(94,224,122,.6)}
  .btn.wip{background:var(--gold); color:#241a00; border-color:var(--gold)}
  .hidden{display:none !important}
  footer{text-align:center; color:var(--dim); padding:50px 20px 40px; font-size:19px}
  footer b{color:var(--magenta)}
  .empty{text-align:center;color:var(--dim);padding:40px;font-size:22px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="logo"><b>gavilanbe</b> // ARCADE</div>
    <p class="blurb">Una colección hecha a mano de <b>juegos</b> — web, terminal y homebrew.<br>Muchos se juegan al instante en el navegador. Sin instalar nada.</p>
    <div class="stats" id="stats"></div>
    <a class="gh" href="https://github.com/gavilanbe" target="_blank" rel="noopener">▸ github.com/gavilanbe</a>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <div class="tabs" id="tabs">
      <span class="tab on" data-f="all">Todos</span>
      <span class="tab" data-f="web">🌐 Jugar online</span>
      <span class="tab" data-f="terminal">🖥️ Terminal</span>
    </div>
    <input id="search" type="search" placeholder="buscar juego…" autocomplete="off">
  </div>
</div>

<main class="wrap" id="main"></main>

<footer>
  Hecho a mano con muchos <b>rectángulos</b> · <span id="count"></span> juegos · 2026<br>
  Dirigido y publicado por <a class="gh" href="https://github.com/gavilanbe" target="_blank" rel="noopener">@gavilanbe</a>
</footer>

<script src="data.js"></script>
<script>
  const $ = s => document.querySelector(s);
  const main = $('#main');
  const nWeb = GAMES.filter(g=>g.type==='web').length;
  const nTerm = GAMES.filter(g=>g.type==='terminal').length;
  $('#stats').innerHTML =
    `<span class="stat"><b>${GAMES.length}</b>juegos</span>`+
    `<span class="stat"><b>${nWeb}</b>jugables online</span>`+
    `<span class="stat"><b>${nTerm}</b>de terminal</span>`;
  $('#count').textContent = GAMES.length;

  const firstEmoji = s => { const m = [...s].find(c=>/\p{Extended_Pictographic}/u.test(c)); return m||'🎮'; };
  const cleanTitle = s => s; // keep emoji + name

  function card(g){
    const el = document.createElement('article');
    el.className = 'card';
    el.dataset.type = g.type;
    el.dataset.search = (g.name+' '+g.title+' '+g.tagline).toLowerCase();
    const shot = g.thumb
      ? `<div class="shot"><span class="chip ${g.type}">${g.type==='web'?'🌐 web':'🖥️ terminal'}</span>${g.wip?'<span class="ribbon">WIP</span>':''}<img loading="lazy" src="${g.thumb}" alt="${g.title}"></div>`
      : `<div class="shot noimg"><span class="chip ${g.type}">${g.type==='web'?'🌐 web':'🖥️ terminal'}</span>${firstEmoji(g.title)}</div>`;
    let actions = '';
    if(g.type==='web'){
      actions += g.wip
        ? `<a class="btn wip" href="${g.play}" target="_blank" rel="noopener">▶ Probar (WIP)</a>`
        : `<a class="btn play" href="${g.play}" target="_blank" rel="noopener">▶ Jugar</a>`;
    }
    actions += `<a class="btn" href="${g.repo}" target="_blank" rel="noopener">&lt;/&gt; Código</a>`;
    el.innerHTML = shot + `<div class="body">
        <div class="title">${cleanTitle(g.title)}</div>
        <div class="tagline">${g.tagline||''}</div>
        <div class="actions">${actions}</div>
      </div>`;
    return el;
  }

  // featured order (los mejores primero), luego el resto alfabético
  const FEATURED = ['sprout-game','nahugavi','gacha-zoo','libreta','makinamon','doodli','chef-game','poke-autobattler','short-hike-demo'];
  const rk = n => { const i = FEATURED.indexOf(n); return i < 0 ? 999 : i; };
  const webGames  = GAMES.filter(g=>g.type==='web').sort((a,b)=> rk(a.name)-rk(b.name) || a.title.localeCompare(b.title));
  const termGames = GAMES.filter(g=>g.type==='terminal').sort((a,b)=> a.title.localeCompare(b.title));
  const secWeb = document.createElement('section');
  secWeb.innerHTML = '<h2 class="sectiontitle">🌐 Jugar en el navegador</h2>';
  const gridWeb = document.createElement('div'); gridWeb.className='grid'; gridWeb.id='gw';
  const secTerm = document.createElement('section');
  secTerm.innerHTML = '<h2 class="sectiontitle">🖥️ Juegos de terminal</h2>';
  const gridTerm = document.createElement('div'); gridTerm.className='grid'; gridTerm.id='gt';
  webGames.forEach(g => gridWeb.appendChild(card(g)));
  termGames.forEach(g => gridTerm.appendChild(card(g)));
  secWeb.appendChild(gridWeb); secTerm.appendChild(gridTerm);
  main.append(secWeb, secTerm);

  // filtering
  let filter='all', q='';
  function apply(){
    [secWeb, secTerm].forEach(sec=>{
      const type = sec===secWeb?'web':'terminal';
      const showSec = (filter==='all'||filter===type);
      let visible=0;
      sec.querySelectorAll('.card').forEach(c=>{
        const ok = showSec && (!q || c.dataset.search.includes(q));
        c.classList.toggle('hidden', !ok);
        if(ok) visible++;
      });
      sec.classList.toggle('hidden', visible===0);
    });
  }
  $('#tabs').addEventListener('click', e=>{
    const t = e.target.closest('.tab'); if(!t) return;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on'); filter=t.dataset.f; apply();
  });
  $('#search').addEventListener('input', e=>{ q=e.target.value.trim().toLowerCase(); apply(); });
</script>
</body>
</html>
